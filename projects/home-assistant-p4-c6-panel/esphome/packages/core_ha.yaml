logger:
  level: INFO

json:

http_request:
  timeout: 10s
  follow_redirects: true
  useragent: GuitionP4ImmichPanel/1.0

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 400kHz
  id: bus_a

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Panel IP Address"
    ssid:
      name: "Panel Wi-Fi SSID"

sensor:
  - platform: uptime
    name: "Panel Uptime"
  - platform: wifi_signal
    name: "Panel Wi-Fi RSSI"
    id: panel_wifi_rssi
    update_interval: 30s

binary_sensor:
  - platform: status
    name: "Panel Online"
