logger:
  level: DEBUG

json:

http_request:
  timeout: 15s
  follow_redirects: true
  verify_ssl: false
  useragent: GuitionP4Panel/1.0

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 400kHz
  id: bus_a

api:
  encryption:
    key: !secret api_encryption_key
  # Default is 5; we've seen the dashboard's stuck "esphome logs" subprocesses
  # plus HA + an occasional debug session exhaust slots and lock out HA.
  max_connections: 12
  # Only run setup/teardown on first-connect / last-disconnect.
  # Multiple clients connect (HA, log streams, etc.) — running refresh and
  # voice_assistant.start_continuous on every connect blocked the API loop
  # and cascaded into socket exhaustion.
  on_client_connected:
    - globals.set:
        id: g_ha_client_count
        value: !lambda 'return id(g_ha_client_count) + 1;'
    - if:
        condition:
          lambda: 'return id(g_ha_client_count) == 1;'
        then:
          - globals.set:
              id: g_ha_connected
              value: 'true'
          - lvgl.widget.hide: ha_disconnected_overlay
          - lvgl.widget.show: tap_zone_btn
          - lvgl.label.update:
              id: dash_error_lbl
              text: ""
          - script.execute: refresh_immich_slideshow
          - voice_assistant.start_continuous:
  on_client_disconnected:
    - globals.set:
        id: g_ha_client_count
        value: !lambda |-
          int c = id(g_ha_client_count) - 1;
          return c < 0 ? 0 : c;
    - if:
        condition:
          lambda: 'return id(g_ha_client_count) == 0;'
        then:
          - globals.set:
              id: g_ha_connected
              value: 'false'
          - lvgl.widget.show: ha_disconnected_overlay
          - lvgl.widget.hide: tap_zone_btn
          - lvgl.page.show: slideshow_page
          - lvgl.label.update:
              id: dash_error_lbl
              text: "Home Assistant disconnected"
          - voice_assistant.stop:

ota:
  - platform: esphome
    password: !secret ota_password

# After repeated boot crashes the device enters safe mode (OTA-only, no user
# code) for 1 minute — gives a reliable window to OTA-flash a fixed firmware
# even if normal boot crashes immediately.
safe_mode:
  boot_is_good_after: 60s
  reboot_timeout: 1min
  num_attempts: 5

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Panel IP Address"
      id: wifi_ip_addr
    ssid:
      name: "Panel Wi-Fi SSID"

  # Displays proxy URL in settings; no auto-refresh on change to avoid
  # cascading download attempts every time HA pushes a state update.
  - platform: homeassistant
    id: ha_immich_url_sensor
    entity_id: input_text.panel_immich_url
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!x.empty()) id(immich_base_url) = x.c_str();

  # Calendar events pushed from HA automation into input_text.panel_calendar_events
  - platform: homeassistant
    id: ha_calendar_events
    entity_id: input_text.panel_calendar_events
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_obj_t* labels[8] = {
              id(cal_evt_0), id(cal_evt_1), id(cal_evt_2), id(cal_evt_3),
              id(cal_evt_4), id(cal_evt_5), id(cal_evt_6), id(cal_evt_7)
            };
            lv_obj_t* row_objs[8] = {
              id(cal_row_0), id(cal_row_1), id(cal_row_2), id(cal_row_3),
              id(cal_row_4), id(cal_row_5), id(cal_row_6), id(cal_row_7)
            };
            std::string text = x.empty() ? "No events this week" : x;
            // Show first row with "No events" if empty, else fill rows per event
            bool no_events = x.empty();
            for (int i = 0; i < 8; i++) {
              std::string line = "";
              if (!text.empty()) {
                auto nl = text.find('\n');
                line = (nl != std::string::npos) ? text.substr(0, nl) : text;
                text = (nl != std::string::npos) ? text.substr(nl + 1) : "";
              }
              lv_label_set_text(labels[i], line.c_str());
              if (!line.empty()) {
                lv_obj_clear_flag(row_objs[i], LV_OBJ_FLAG_HIDDEN);
              } else {
                lv_obj_add_flag(row_objs[i], LV_OBJ_FLAG_HIDDEN);
              }
            }

  # ─── Room dashboard: light state + brightness + temp/humidity ─────────
  # Each room card subscribes to light state ("on"/"off"), updates the bulb
  # tint and ON/OFF label. Dimmable rooms (2-5) also subscribe to brightness
  # and drive the arc. Temp/humidity update text labels.
  - platform: homeassistant
    id: room1_state
    entity_id: "${room1_light}"
    internal: true
    on_value:
      then:
        - lambda: |-
            bool on = (x == "on");
            lv_label_set_text(id(room1_state_lbl), on ? "ON" : "OFF");
            lv_obj_set_style_text_color(id(room1_state_lbl), on ? lv_color_hex(0xFFD700) : lv_color_hex(0x666666), 0);
            lv_obj_set_style_img_recolor(id(room1_icon), on ? lv_color_hex(0xFFD700) : lv_color_hex(0x555555), 0);
            lv_obj_set_style_img_recolor_opa(id(room1_icon), LV_OPA_COVER, 0);
  - platform: homeassistant
    id: room1_temp_s
    entity_id: "${room1_temp}"
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(room1_temp_lbl), (x + "\xC2\xB0").c_str());
  - platform: homeassistant
    id: room1_hum_s
    entity_id: "${room1_humidity}"
    internal: true
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(room1_hum_lbl), (x + "%").c_str());

  - platform: homeassistant
    id: room2_state
    entity_id: "${room2_light}"
    internal: true
    on_value:
      then:
        - lambda: |-
            bool on = (x == "on");
            lv_label_set_text(id(room2_state_lbl), on ? "ON" : "OFF");
            lv_obj_set_style_text_color(id(room2_state_lbl), on ? lv_color_hex(0xFFD700) : lv_color_hex(0x666666), 0);
            lv_obj_set_style_img_recolor(id(room2_icon), on ? lv_color_hex(0xFFD700) : lv_color_hex(0x555555), 0);
            lv_obj_set_style_img_recolor_opa(id(room2_icon), LV_OPA_COVER, 0);
  - platform: homeassistant
    id: room2_brightness
    entity_id: "${room2_light}"
    attribute: brightness
    internal: true
    on_value:
      then:
        - lambda: |-
            int b = atoi(x.c_str());
            int pct = (b * 100) / 255;
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            lv_slider_set_value(id(room2_arc), pct, LV_ANIM_OFF);
  - platform: homeassistant
    id: room2_temp_s
    entity_id: "${room2_temp}"
    internal: true
