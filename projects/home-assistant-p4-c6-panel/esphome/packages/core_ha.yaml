            lv_obj_set_style_img_recolor(id(room4_icon), on ? lv_color_hex(0xFFD700) : lv_color_hex(0x555555), 0);
            lv_obj_set_style_img_recolor_opa(id(room4_icon), LV_OPA_COVER, 0);
  - platform: homeassistant
    id: room4_brightness
