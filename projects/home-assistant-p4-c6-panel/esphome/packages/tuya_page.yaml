# ═══════════════════════════════════════════════════════════════════════════════
# Tuya Devices Page — direct Tuya Cloud API via local tuya-bridge service.
# No Home Assistant involved. Bridge runs on the Docker host at port 8766
# and handles auth/signing. Panel calls simple HTTP endpoints.
#
# Devices:
#   Switches : Drawing Room Plug, Garden Plug, Bed Power Strip, Bed Power Switch
#   Sensors  : Conservatory Door, Smoke, CO, Water, Security Alarm, Mukta Lock
#   Scenes   : TV On, TV Off, All Sockets Off
#
# Navigation: Camera page ← swipe right | swipe left → Slideshow
# ═══════════════════════════════════════════════════════════════════════════════

globals:
  # Switch states (true = on)
  - { id: g_tuya_draw_on,    type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_tuya_garden_on,  type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_tuya_bstrip_on,  type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_tuya_bswitch_on, type: bool, restore_value: no, initial_value: 'false' }
  # Sensor states
  - { id: g_tuya_door_open,  type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_tuya_smoke,      type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_tuya_co,         type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_tuya_co_ppm,     type: int,  restore_value: no, initial_value: '0'     }
  - { id: g_tuya_water,      type: bool, restore_value: no, initial_value: 'false' }
  # Flag so the 30s refresh interval only fires while we're on this page
  - { id: g_on_tuya_page,    type: bool, restore_value: no, initial_value: 'false' }

script:
  # ── Parse /tuya/all response and update every UI label in one shot ────────
  - id: tuya_parse_all
    mode: single
    then:
      - http_request.get:
          url: "${tuya_bridge_url}/tuya/all"
          on_response:
            then:
              - lambda: |-
                  if (status_code != 200) {
                    if (id(g_lvgl_ready)) lv_label_set_text(id(tuya_status_lbl), "Bridge Error");
                    return;
                  }
                  auto body_str = body;

                  // Helper: true if key "\"K\":{\"on\":true" is in body
                  auto sw_on = [&](const char* key) -> bool {
                    std::string pat = std::string("\"") + key + "\":{\"on\":true";
                    return body_str.find(pat) != std::string::npos;
                  };
                  auto has = [&](const char* pat) -> bool {
                    return body_str.find(pat) != std::string::npos;
                  };

                  // Switches
                  id(g_tuya_draw_on)    = sw_on("drawing_plug");
                  id(g_tuya_garden_on)  = sw_on("garden_plug");
                  id(g_tuya_bstrip_on)  = sw_on("bed_strip");
                  id(g_tuya_bswitch_on) = sw_on("bed_switch");
                  // Sensors
                  id(g_tuya_door_open) = has("\"consv_door\":{\"open\":true");
                  id(g_tuya_smoke)     = has("\"smoke\":{\"alarm\":true");
                  id(g_tuya_co)        = has("\"co\":{\"alarm\":true");
                  id(g_tuya_water)     = has("\"water\":{\"wet\":true");

                  // CO ppm — look for "\"ppm\":" and parse the number
                  auto ppm_pos = body_str.find("\"ppm\":");
                  if (ppm_pos != std::string::npos) {
                    id(g_tuya_co_ppm) = atoi(body_str.c_str() + ppm_pos + 6);
                  }

                  if (!id(g_lvgl_ready)) return;

                  // ── Update switch cards ──────────────────────────────────
                  auto upd_sw = [&](bool on,
                                    lv_obj_t* lbl, lv_obj_t* icon, lv_obj_t* card) {
                    lv_label_set_text(lbl, on ? "ON" : "OFF");
                    lv_obj_set_style_text_color(lbl,
                        lv_color_hex(on ? 0xFFD700 : 0x666666), 0);
                    lv_obj_set_style_img_recolor(icon,
                        lv_color_hex(on ? 0xFFD700 : 0x444444), 0);
                    lv_obj_set_style_img_recolor_opa(icon, LV_OPA_COVER, 0);
                    lv_obj_set_style_bg_color(card,
                        lv_color_hex(on ? 0x1A2840 : 0x162044), 0);
                  };
                  upd_sw(id(g_tuya_draw_on),    id(tuya_draw_lbl),    id(tuya_draw_icon),    id(tuya_draw_card));
                  upd_sw(id(g_tuya_garden_on),  id(tuya_garden_lbl),  id(tuya_garden_icon),  id(tuya_garden_card));
                  upd_sw(id(g_tuya_bstrip_on),  id(tuya_bstrip_lbl),  id(tuya_bstrip_icon),  id(tuya_bstrip_card));
                  upd_sw(id(g_tuya_bswitch_on), id(tuya_bswitch_lbl), id(tuya_bswitch_icon), id(tuya_bswitch_card));

                  // ── Update sensor cards ──────────────────────────────────
                  // Door
                  lv_label_set_text(id(tuya_door_lbl),
                      id(g_tuya_door_open) ? "OPEN" : "CLOSED");
                  lv_obj_set_style_text_color(id(tuya_door_lbl),
                      lv_color_hex(id(g_tuya_door_open) ? 0xFF5252 : 0x69F0AE), 0);

                  // Smoke
                  lv_label_set_text(id(tuya_smoke_lbl),
                      id(g_tuya_smoke) ? "ALARM!" : "Clear");
                  lv_obj_set_style_text_color(id(tuya_smoke_lbl),
                      lv_color_hex(id(g_tuya_smoke) ? 0xFF5252 : 0x69F0AE), 0);

                  // CO
                  char co_buf[24];
                  if (id(g_tuya_co)) {
                    snprintf(co_buf, sizeof(co_buf), "ALARM! %dppm", id(g_tuya_co_ppm));
                  } else {
                    snprintf(co_buf, sizeof(co_buf), "Clear %dppm", id(g_tuya_co_ppm));
                  }
                  lv_label_set_text(id(tuya_co_lbl), co_buf);
                  lv_obj_set_style_text_color(id(tuya_co_lbl),
                      lv_color_hex(id(g_tuya_co) ? 0xFF5252 : 0x69F0AE), 0);

                  // Water
                  lv_label_set_text(id(tuya_water_lbl),
                      id(g_tuya_water) ? "LEAK!" : "Dry");
                  lv_obj_set_style_text_color(id(tuya_water_lbl),
                      lv_color_hex(id(g_tuya_water) ? 0xFF5252 : 0x69F0AE), 0);

                  lv_label_set_text(id(tuya_status_lbl), "Updated");

  # ── Toggle helpers (optimistic: flip local state immediately, then confirm) ─
  - id: tuya_toggle_draw
    mode: single
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${tuya_bridge_url}/tuya/device/drawing_plug/toggle");
          on_response:
            then:
              - lambda: |-
                  bool on = body.find("\"on\":true") != std::string::npos;
                  id(g_tuya_draw_on) = on;
                  if (!id(g_lvgl_ready)) return;
                  lv_label_set_text(id(tuya_draw_lbl), on ? "ON" : "OFF");
                  lv_obj_set_style_text_color(id(tuya_draw_lbl), lv_color_hex(on ? 0xFFD700 : 0x666666), 0);
                  lv_obj_set_style_img_recolor(id(tuya_draw_icon), lv_color_hex(on ? 0xFFD700 : 0x444444), 0);
                  lv_obj_set_style_img_recolor_opa(id(tuya_draw_icon), LV_OPA_COVER, 0);
                  lv_obj_set_style_bg_color(id(tuya_draw_card), lv_color_hex(on ? 0x1A2840 : 0x162044), 0);

  - id: tuya_toggle_garden
    mode: single
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${tuya_bridge_url}/tuya/device/garden_plug/toggle");
          on_response:
            then:
              - lambda: |-
                  bool on = body.find("\"on\":true") != std::string::npos;
                  id(g_tuya_garden_on) = on;
                  if (!id(g_lvgl_ready)) return;
                  lv_label_set_text(id(tuya_garden_lbl), on ? "ON" : "OFF");
                  lv_obj_set_style_text_color(id(tuya_garden_lbl), lv_color_hex(on ? 0xFFD700 : 0x666666), 0);
                  lv_obj_set_style_img_recolor(id(tuya_garden_icon), lv_color_hex(on ? 0xFFD700 : 0x444444), 0);
                  lv_obj_set_style_img_recolor_opa(id(tuya_garden_icon), LV_OPA_COVER, 0);
                  lv_obj_set_style_bg_color(id(tuya_garden_card), lv_color_hex(on ? 0x1A2840 : 0x162044), 0);

  - id: tuya_toggle_bstrip
    mode: single
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${tuya_bridge_url}/tuya/device/bed_strip/toggle");
          on_response:
            then:
              - lambda: |-
                  bool on = body.find("\"on\":true") != std::string::npos;
                  id(g_tuya_bstrip_on) = on;
                  if (!id(g_lvgl_ready)) return;
                  lv_label_set_text(id(tuya_bstrip_lbl), on ? "ON" : "OFF");
                  lv_obj_set_style_text_color(id(tuya_bstrip_lbl), lv_color_hex(on ? 0xFFD700 : 0x666666), 0);
                  lv_obj_set_style_img_recolor(id(tuya_bstrip_icon), lv_color_hex(on ? 0xFFD700 : 0x444444), 0);
                  lv_obj_set_style_img_recolor_opa(id(tuya_bstrip_icon), LV_OPA_COVER, 0);
                  lv_obj_set_style_bg_color(id(tuya_bstrip_card), lv_color_hex(on ? 0x1A2840 : 0x162044), 0);

  - id: tuya_toggle_bswitch
    mode: single
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${tuya_bridge_url}/tuya/device/bed_switch/toggle");
          on_response:
            then:
              - lambda: |-
                  bool on = body.find("\"on\":true") != std::string::npos;
                  id(g_tuya_bswitch_on) = on;
                  if (!id(g_lvgl_ready)) return;
                  lv_label_set_text(id(tuya_bswitch_lbl), on ? "ON" : "OFF");
                  lv_obj_set_style_text_color(id(tuya_bswitch_lbl), lv_color_hex(on ? 0xFFD700 : 0x666666), 0);
                  lv_obj_set_style_img_recolor(id(tuya_bswitch_icon), lv_color_hex(on ? 0xFFD700 : 0x444444), 0);
                  lv_obj_set_style_img_recolor_opa(id(tuya_bswitch_icon), LV_OPA_COVER, 0);
                  lv_obj_set_style_bg_color(id(tuya_bswitch_card), lv_color_hex(on ? 0x1A2840 : 0x162044), 0);

interval:
  # Refresh Tuya states every 30 s while the page is visible
  - interval: 30s
    then:
      - if:
          condition:
            lambda: 'return id(g_on_tuya_page);'
          then:
            - script.execute: tuya_parse_all

lvgl:
  pages:
    # ═══════════════════════════════════════════════════════════
    # PAGE 8 — TUYA DEVICES (direct cloud, no HA)
    # Layout: top bar 58px | 4 switch cards 2x2 (left) | 4 sensor cards 2x2 (right)
    # Navigate: swipe right → camera_page | swipe left → slideshow_page
    # ═══════════════════════════════════════════════════════════
    - id: tuya_page
      bg_color: 0x07080F
      on_load:
        - globals.set: { id: g_on_tuya_page, value: 'true' }
        - script.execute: tuya_parse_all
      on_unload:
        - globals.set: { id: g_on_tuya_page, value: 'false' }
      on_swipe_right:
        - lvgl.page.show: camera_page
      on_swipe_left:
        - lvgl.page.show: slideshow_page
      widgets:

        # ── Top bar ────────────────────────────────────────────
        - obj:
            width: 1024
            height: 58
            align: TOP_LEFT
            bg_color: 0x12192E
            bg_opa: 96%
            border_width: 0
            border_side: BOTTOM
            border_color: 0x1E3A6E
            pad_all: 0
            widgets:
              - label:
                  align: LEFT_MID
                  x: 20
                  text: "Tuya"
                  text_font: montserrat_24
                  text_color: 0xFF9800
              - label:
                  align: CENTER
                  text: "Direct Cloud Control"
                  text_font: montserrat_18
                  text_color: 0xAAAAAA
              - label:
                  align: RIGHT_MID
                  x: -20
                  text: "< Cameras    Slideshow >"
                  text_font: montserrat_16
                  text_color: 0xFF9800
              - label:
                  id: tuya_status_lbl
                  align: LEFT_MID
                  x: 110
                  text: "--"
                  text_font: montserrat_14
                  text_color: 0x555577

        # ══════════════════════════════════════════════════════
        # LEFT HALF (x=0..511) — 4 switch cards in 2x2 grid
        # ══════════════════════════════════════════════════════

        # Card 1: Drawing Room Plug ─────────────────────────
        - obj:
            id: tuya_draw_card
            x: 10
            y: 70
            width: 236
            height: 240
            align: TOP_LEFT
            bg_color: 0x162044
            bg_opa: 97%
            border_color: 0xFF980044
            border_width: 2
            radius: 14
            pad_all: 0
            on_click:
              - script.execute: tuya_toggle_draw
            widgets:
              - image:
                  id: tuya_draw_icon
                  src: img_lightbulb
                  align: TOP_MID
                  y: 18
              - label:
                  align: TOP_MID
                  y: 80
                  text: "Drawing Room"
                  text_font: montserrat_16
                  text_color: 0xCCCCCC
              - label:
                  id: tuya_draw_lbl
                  align: CENTER
                  y: 30
                  text: "--"
                  text_font: montserrat_28
                  text_color: 0x666666
              - label:
                  align: BOTTOM_MID
                  y: -12
                  text: "Tap to toggle"
                  text_font: montserrat_14
                  text_color: 0x445566

        # Card 2: Garden Plug ───────────────────────────────
        - obj:
            id: tuya_garden_card
            x: 256
            y: 70
            width: 236
            height: 240
            align: TOP_LEFT
            bg_color: 0x162044
            bg_opa: 97%
            border_color: 0xFF980044
            border_width: 2
            radius: 14
            pad_all: 0
            on_click:
